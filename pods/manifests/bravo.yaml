# bravo.yaml
# A multi-container Pod that uses a PersistentVolumeClaim.
# - init container runs first and prepares the shared volume
# - "writer" appends a heartbeat line every few seconds
# - "reader" tails the same file
# Both app containers share the same persistent volume mounted at /data.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bravo-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: bravo
  labels:
    app: bravo
spec:
  restartPolicy: Always
  initContainers:
    - name: prep
      image: busybox:1.36
      command: ["sh", "-c", "echo 'init done at' $(date) > /data/init.log"]
      volumeMounts:
        - name: shared
          mountPath: /data
  containers:
    - name: writer
      image: busybox:1.36
      command:
        - sh
        - -c
        - "while true; do echo $(date) >> /data/heartbeat.log; sleep 5; done"
      volumeMounts:
        - name: shared
          mountPath: /data
      resources:
        requests:
          cpu: "25m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
    - name: reader
      image: busybox:1.36
      command: ["sh", "-c", "tail -f /data/heartbeat.log"]
      volumeMounts:
        - name: shared
          mountPath: /data
      resources:
        requests:
          cpu: "25m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
  volumes:
    - name: shared
      persistentVolumeClaim:
        claimName: bravo-pvc
